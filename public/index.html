<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="기후변화 시나리오 기반 지역별 전망 통계 지도" />
    <title>기후 전망 지도</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <p>Climate outlook</p>
          <h1>기후 전망 지도</h1>
        </div>
      </div>
      <div class="status" id="dataStatus"><span></span> 228개 지역 · 2021–2100</div>
    </header>

    <main class="dashboard">
      <section class="map-workspace" aria-label="지역별 전망 지도">
        <div class="map-toolbar">
          <label>
            <span>시도</span>
            <select id="provinceSelect"></select>
          </label>
          <label>
            <span>시군구</span>
            <select id="regionSelect"></select>
          </label>
          <button class="icon-button" id="resetMap" type="button" title="전국 보기" aria-label="전국 보기">
            <i data-lucide="scan"></i>
          </button>
        </div>
        <div id="map"></div>
        <div class="map-legend" aria-label="재난값 범례">
          <span>낮음</span>
          <div class="legend-scale"></div>
          <span>높음</span>
        </div>
      </section>

      <aside class="analysis-panel">
        <section class="selection-heading">
          <p id="provinceName">강원특별자치도</p>
          <h2 id="regionName">강릉시</h2>
          <div class="scenario-tabs" id="scenarioTabs" aria-label="시나리오 선택"></div>
        </section>

        <section class="year-control">
          <div>
            <span>기준 연도</span>
            <strong id="yearLabel">2050</strong>
          </div>
          <input id="yearSlider" type="range" min="2021" max="2100" value="2050" step="1" />
          <div class="range-labels"><span>2021</span><span>2100</span></div>
        </section>

        <section class="kpi-grid" aria-label="핵심 통계">
          <article class="kpi kpi-primary">
            <i data-lucide="activity"></i>
            <span>평균 재난값</span>
            <strong id="meanValue">-</strong>
          </article>
          <article class="kpi">
            <i data-lucide="move-horizontal"></i>
            <span>P10–P90</span>
            <strong id="rangeValue">-</strong>
          </article>
          <article class="kpi">
            <i data-lucide="trending-up"></i>
            <span>2021년 대비</span>
            <strong id="changeValue">-</strong>
          </article>
          <article class="kpi">
            <i data-lucide="map-pin"></i>
            <span>전국 백분위</span>
            <strong id="percentileValue">-</strong>
          </article>
        </section>

        <section class="chart-section">
          <div class="section-title">
            <div>
              <span>Time series</span>
              <h3>연도별 전망</h3>
            </div>
            <span class="chart-key"><i></i>P10–P90</span>
          </div>
          <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </section>

        <section class="chart-section comparison-section">
          <div class="section-title">
            <div>
              <span>Scenario comparison</span>
              <h3><b id="comparisonYear">2050</b>년 시나리오 비교</h3>
            </div>
          </div>
          <div class="comparison-wrap"><canvas id="comparisonChart"></canvas></div>
        </section>

        <footer class="panel-footer">
          <span>50개 Rank 요약 통계</span>
          <span>평균 · P10 · P90</span>
        </footer>
      </aside>
    </main>

    <div class="loading" id="loading" role="status">
      <span class="loader"></span>
      <p>전망 데이터를 불러오는 중</p>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
